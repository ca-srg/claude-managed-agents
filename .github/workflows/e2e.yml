name: E2E

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-real-fixture
  cancel-in-progress: false

jobs:
  real-e2e:
    name: Real E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.actor != 'dependabot[bot]' &&
          github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    env:
      E2E: "1"
      TEST_REPO: rluisr/e2e-disposable-test
      TEST_ISSUE: "1"
      E2E_TIMEOUT_MS: "1800000"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_APP_ID: ${{ secrets.MY_GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.MY_GITHUB_APP_PRIVATE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run real E2E harness
        shell: bash
        run: |
          set -o pipefail
          bun run --env-file=/dev/null scripts/e2e-real.ts 2>&1 | tee e2e-real.log
          grep -q '^E2E_REAL_PASS ' e2e-real.log

      - name: Upload E2E log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-real-log
          path: e2e-real.log
          if-no-files-found: ignore
