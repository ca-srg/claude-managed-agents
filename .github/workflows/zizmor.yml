name: zizmor

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: "0 6 * * 1" # Weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: zizmor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout (and private refs, if any)
      security-events: write # upload SARIF to code scanning
      actions: read # read workflow runs for SARIF upload (private/internal repos)
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: 1.25.2
          inputs: .github/workflows/
          persona: regular
          # advanced-security uploads SARIF to GitHub code scanning when enabled.
          # Disable it for forked and Dependabot PRs because those runs only get a
          # read-only token and cannot obtain security-events: write. The job does
          # not fail on findings; enforce merge blocking via a code scanning ruleset.
          advanced-security: >-
            ${{
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            }}
